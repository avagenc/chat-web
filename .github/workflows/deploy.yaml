name: Deploy

on:
  push:
    branches: ['main', 'dev']

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      APP_ENV: ${{ vars.APP_ENV }}
      REGION: asia-southeast1
      REPO_NAME: docker
      SERVICE_NAME: chat
      IMAGE_NAME: chat

    steps:
      - name: Validate Deploy Configuration
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
          PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: |
          missing=0
          for name in GCP_SA_KEY GCP_PROJECT_ID PUBLIC_API_BASE PUBLIC_FIREBASE_API_KEY PUBLIC_FIREBASE_APP_ID PUBLIC_FIREBASE_AUTH_DOMAIN PUBLIC_SITE_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty — set it as a secret/variable in the '${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}' GitHub environment"
              missing=1
            fi
          done
          exit $missing

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        env:
          IMAGE_URL: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker buildx build --platform linux/amd64 \
            -t $IMAGE_URL --push .

      - name: Deploy to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--allow-unauthenticated --memory=128Mi --cpu=1 --min-instances=0 --max-instances=1 --cpu-boost'
          env_vars: |
            PUBLIC_API_BASE=${{ vars.PUBLIC_API_BASE }}
            PUBLIC_FIREBASE_API_KEY=${{ vars.PUBLIC_FIREBASE_API_KEY }}
            PUBLIC_FIREBASE_APP_ID=${{ vars.PUBLIC_FIREBASE_APP_ID }}
            PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
            PUBLIC_FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL }}
